<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Destaka — Export LinkedIn Assets</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      font-family: 'Plus Jakarta Sans', sans-serif;
      padding: 48px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
      min-height: 100vh;
    }

    h1 {
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .asset-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 900px;
    }

    .asset-card h2 {
      color: #888;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      align-self: flex-start;
    }

    canvas {
      border-radius: 4px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }

    #profileCanvas {
      border-radius: 50%;
      width: 200px;
      height: 200px;
    }

    #bannerCanvas {
      width: 100%;
      max-width: 820px;
      height: auto;
    }

    .btn {
      background: #14532D;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Plus Jakarta Sans', sans-serif;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: background 0.2s;
    }

    .btn:hover { background: #166534; }

    .btn-amber {
      background: #D97706;
    }
    .btn-amber:hover { background: #B45309; }

    .specs {
      color: #444;
      font-size: 11px;
      align-self: flex-start;
    }

    .status {
      color: #D97706;
      font-size: 13px;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <h1>Destaka — LinkedIn Assets</h1>
  <p class="status" id="status">Carregando fontes...</p>

  <!-- PERFIL -->
  <div class="asset-card">
    <h2>Foto de Perfil — 300 × 300px</h2>
    <canvas id="profileCanvas" width="300" height="300"></canvas>
    <p class="specs">PNG · 300 × 300px · fundo sólido (LinkedIn recorta em círculo)</p>
    <button class="btn" onclick="downloadAsset('profileCanvas', 'destaka-linkedin-perfil.png')">
      ⬇ Download Foto de Perfil (PNG)
    </button>
  </div>

  <!-- BANNER -->
  <div class="asset-card">
    <h2>Banner / Capa — 1128 × 191px</h2>
    <canvas id="bannerCanvas" width="1128" height="191"></canvas>
    <p class="specs">PNG · 1128 × 191px · zona segura: x 100–1028</p>
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
      <button class="btn" onclick="downloadAsset('bannerCanvas', 'destaka-linkedin-banner.png')">
        ⬇ Download Banner (PNG)
      </button>
      <button class="btn btn-amber" onclick="downloadAsset('bannerCanvas', 'destaka-linkedin-banner.jpg', 'jpeg')">
        ⬇ Download Banner (JPG)
      </button>
    </div>
  </div>

  <script>
    const GREEN  = '#14532D';
    const AMBER  = '#D97706';
    const WHITE  = '#FFFFFF';
    const WHITE20 = 'rgba(255,255,255,0.2)';
    const WHITE03 = 'rgba(255,255,255,0.03)';
    const AMBER06 = 'rgba(217,119,6,0.06)';

    /* ─── PERFIL ─── */
    function drawProfile() {
      const canvas = document.getElementById('profileCanvas');
      const ctx = canvas.getContext('2d');
      const W = canvas.width;
      const H = canvas.height;

      // Fundo
      ctx.fillStyle = GREEN;
      ctx.fillRect(0, 0, W, H);

      // Estrela centralizada
      ctx.fillStyle = WHITE;
      ctx.font = '800 130px "Plus Jakarta Sans", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('✦', W / 2, H / 2 + 6);
    }

    /* ─── BANNER ─── */
    function drawBanner() {
      const canvas = document.getElementById('bannerCanvas');
      const ctx = canvas.getContext('2d');
      const W = canvas.width;   // 1128
      const H = canvas.height;  // 191
      const CY = H / 2;         // 95.5
      const PAD = 64;

      // Fundo
      ctx.fillStyle = GREEN;
      ctx.fillRect(0, 0, W, H);

      // Círculo decorativo topo-direita
      ctx.fillStyle = WHITE03;
      ctx.beginPath();
      ctx.arc(W - 20, -60, 200, 0, Math.PI * 2);
      ctx.fill();

      // Círculo decorativo baixo-direita
      ctx.fillStyle = AMBER06;
      ctx.beginPath();
      ctx.arc(W - 100, H + 80, 160, 0, Math.PI * 2);
      ctx.fill();

      // ── Estrela ──
      ctx.fillStyle = WHITE;
      ctx.font = '800 52px "Plus Jakarta Sans", sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText('✦', PAD, CY + 2);

      // ── "Destaka" ──
      ctx.font = '800 36px "Plus Jakarta Sans", sans-serif';
      const starW = ctx.measureText('✦').width;
      const logoX = PAD + starW + 16;
      ctx.fillText('Destaka', logoX, CY + 1);

      // Medir largura total do logo para posicionar o divider
      const destakaW = ctx.measureText('Destaka').width;
      const dividerX = logoX + destakaW + 40;

      // ── Divider ──
      ctx.strokeStyle = WHITE20;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(dividerX, CY - 32);
      ctx.lineTo(dividerX, CY + 32);
      ctx.stroke();

      // ── Tagline ──
      ctx.fillStyle = AMBER;
      ctx.font = '800 26px "Plus Jakarta Sans", sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText('Seu consultório no topo do Google.', dividerX + 36, CY + 1);
    }

    /* ─── DOWNLOAD ─── */
    function downloadAsset(canvasId, filename, format = 'png') {
      const canvas = document.getElementById(canvasId);
      const mimeType = format === 'jpeg' ? 'image/jpeg' : 'image/png';
      const quality = format === 'jpeg' ? 0.95 : 1.0;

      canvas.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
      }, mimeType, quality);
    }

    /* ─── INIT ─── */
    async function init() {
      // Aguarda fontes carregarem antes de renderizar
      await document.fonts.ready;

      // Força load da fonte específica antes de usar no canvas
      await Promise.all([
        document.fonts.load('800 52px "Plus Jakarta Sans"'),
        document.fonts.load('800 36px "Plus Jakarta Sans"'),
        document.fonts.load('800 130px "Plus Jakarta Sans"'),
      ]);

      drawProfile();
      drawBanner();

      document.getElementById('status').textContent = '✓ Assets prontos para download';
      document.getElementById('status').style.color = '#4ade80';
    }

    init();
  </script>
</body>
</html>
