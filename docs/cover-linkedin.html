<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Destaka Capa LinkedIn</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 28px;
      font-family: sans-serif;
    }

    #cover-canvas {
      width: 1128px;
      height: 191px;
      background: linear-gradient(120deg, #14532D 0%, #0A2E18 60%, #0d3a1e 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Orbs */
    .orb1 {
      position: absolute;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(217,119,6,0.22) 0%, transparent 65%);
      top: -200px; right: 80px;
      border-radius: 50%;
      pointer-events: none;
    }
    .orb2 {
      position: absolute;
      width: 250px; height: 250px;
      background: radial-gradient(circle, rgba(22,163,74,0.12) 0%, transparent 65%);
      bottom: -120px; left: 200px;
      border-radius: 50%;
      pointer-events: none;
    }

    /* Grid de pontos sutil */
    .dots {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
    }

    /* Conteúdo */
    .content {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 0 80px;
    }

    /* Logo lado esquerdo */
    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .logo-star {
      font-size: 48px;
      color: #F59E0B;
      filter: drop-shadow(0 0 16px rgba(245,158,11,0.7));
      line-height: 1;
    }
    .logo-text {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 54px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -2px;
      line-height: 1;
    }
    .logo-text span { color: #F59E0B; }

    /* Divider */
    .divider {
      width: 1px;
      height: 60px;
      background: rgba(255,255,255,0.15);
    }

    /* Tagline lado direito */
    .tagline {
      text-align: right;
    }
    .tagline-main {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
      letter-spacing: -0.3px;
      line-height: 1.3;
    }
    .tagline-sub {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.45);
      margin-top: 4px;
    }

    /* Badge em breve */
    .badge {
      position: absolute;
      bottom: 18px;
      right: 80px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #FCD34D;
      background: rgba(245,158,11,0.15);
      border: 1px solid rgba(245,158,11,0.3);
      padding: 4px 12px;
      border-radius: 100px;
      z-index: 3;
    }

    .btn {
      padding: 12px 28px;
      background: #F59E0B;
      color: #1C1917;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: sans-serif;
    }
    .btn:hover { background: #D97706; }
    p { color: rgba(255,255,255,0.35); font-size: 13px; }
  </style>
</head>
<body>

  <div id="cover-canvas">
    <div class="orb1"></div>
    <div class="orb2"></div>
    <div class="dots"></div>

    <div class="content">
      <div class="logo">
        <span class="logo-star">✦</span>
        <span class="logo-text">Desta<span>ka</span></span>
      </div>

      <div class="divider"></div>

      <div class="tagline">
        <div class="tagline-main">Você cuida dos seus pacientes.<br>A gente cuida do Google pra você.</div>
        <div class="tagline-sub">destaka.com.br</div>
      </div>
    </div>

    <div class="badge">Em breve</div>
  </div>

  <button class="btn" onclick="download()">Baixar PNG (1128x191)</button>
  <p>Tamanho oficial para capa do LinkedIn</p>

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script>
    async function download() {
      // Aguarda fontes carregarem completamente
      await document.fonts.ready;
      const el = document.getElementById('cover-canvas');
      html2canvas(el, {
        width: 1128,
        height: 191,
        scale: 2,
        backgroundColor: null,
        useCORS: true,
        allowTaint: true,
        logging: false,
        onclone: (doc) => {
          return doc.fonts.ready;
        }
      }).then(canvas => {
        const link = document.createElement('a');
        link.download = 'destaka-capa-linkedin-1128x191.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    }
  </script>

</body>
</html>
